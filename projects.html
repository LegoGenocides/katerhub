<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>katerhub dev.</title>

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Montserrat:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'JetBrains Mono', monospace;
        background: #0f0f0f;
        color: #fff;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(
          circle at center,
          rgba(0, 0, 0, 1) 0%,
          rgba(0, 0, 0, 0.8) 35%,
          rgba(0, 0, 0, 0.2) 60%,
          rgba(0, 0, 0, 0) 90%
        );
        -webkit-mask-image: radial-gradient(
          circle at center,
          rgba(0, 0, 0, 1) 0%,
          rgba(0, 0, 0, 0.8) 35%,
          rgba(0, 0, 0, 0.2) 60%,
          rgba(0, 0, 0, 0) 90%
        );
        z-index: 0;
      }

      header {
        position: sticky;
        top: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 40px;
        background: rgba(15, 15, 15, 0.85);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 10;
      }

      .logo {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-style: italic;
        font-size: 18px;
        color: rgba(255, 255, 255, 0.09);
        min-width: 140px;
      }

      .nav-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 28px;
      }

      .nav-center a {
        text-decoration: none;
        color: #9a9a9a;
        font-size: 14px;
        transition: 0.2s;
        position: relative;
      }

      .nav-center a:hover,
      .nav-center a.active {
        color: #fff;
      }

      .nav-center a.active::after,
      .nav-center a:hover::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -6px;
        width: 100%;
        height: 1px;
        background: rgba(124, 92, 255, 0.9);
      }

      .hero {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 120px 20px 70px;
      }

      .hero h1 {
        font-size: 46px;
        margin-bottom: 12px;
      }

      .hero p {
        color: #aaa;
        font-size: 15px;
        max-width: 680px;
        margin: 0 auto;
      }

      .hero-buttons {
        margin-top: 26px;
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .discord-btn,
      .group-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        width: fit-content;
        max-width: max-content;
        white-space: nowrap;
        text-decoration: none;
        padding: 11px 18px;
        border-radius: 999px;
        overflow: hidden;
        position: relative;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease,
          background 0.22s ease,
          border-color 0.22s ease;
      }

      .discord-btn {
        color: #f3f0ff;
        border: 1px solid rgba(124, 92, 255, 0.3);
        background: linear-gradient(
          180deg,
          rgba(124, 92, 255, 0.2) 0%,
          rgba(124, 92, 255, 0.1) 100%
        );
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 8px 30px rgba(124, 92, 255, 0.14);
      }

      .discord-btn::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8f72ff;
        box-shadow: 0 0 12px rgba(143, 114, 255, 0.85);
        flex-shrink: 0;
      }

      .discord-btn:hover {
        transform: translateY(-2px);
        border-color: rgba(124, 92, 255, 0.48);
        background: linear-gradient(
          180deg,
          rgba(124, 92, 255, 0.28) 0%,
          rgba(124, 92, 255, 0.14) 100%
        );
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 0 24px rgba(124, 92, 255, 0.22),
          0 12px 35px rgba(124, 92, 255, 0.16);
      }

      .group-btn {
        color: #eef6ff;
        border: 1px solid rgba(59, 130, 246, 0.32);
        background: linear-gradient(
          180deg,
          rgba(59, 130, 246, 0.22) 0%,
          rgba(59, 130, 246, 0.1) 100%
        );
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 8px 30px rgba(59, 130, 246, 0.16);
      }

      .group-btn::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 2px;
        background: #60a5fa;
        box-shadow: 0 0 12px rgba(96, 165, 250, 0.85);
        flex-shrink: 0;
      }

      .group-btn:hover {
        transform: translateY(-2px);
        border-color: rgba(59, 130, 246, 0.5);
        background: linear-gradient(
          180deg,
          rgba(59, 130, 246, 0.3) 0%,
          rgba(59, 130, 246, 0.14) 100%
        );
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 0 24px rgba(59, 130, 246, 0.24),
          0 12px 35px rgba(59, 130, 246, 0.18);
      }

      .discord-btn::after,
      .group-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 0%,
          rgba(255, 255, 255, 0.1) 45%,
          transparent 100%
        );
        transform: translateX(-120%);
        transition: transform 0.45s ease;
      }

      .discord-btn:hover::after,
      .group-btn:hover::after {
        transform: translateX(120%);
      }

      .section-wrap {
        position: relative;
        z-index: 2;
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .section-title {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #9a9a9a;
        margin-bottom: 18px;
        padding-left: 4px;
      }

      .projects {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
        margin-bottom: 55px;
      }

      .project-card {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(25, 25, 25, 0.85);
        backdrop-filter: blur(10px);
        transition: 0.25s;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }

      .project-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 0 24px rgba(0, 0, 0, 0.45);
      }

      .project-image {
        width: 100%;
        height: 190px;
        object-fit: cover;
        display: block;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: #111;
      }

      .project-content {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        flex: 1;
      }

      .project-main {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .project-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .project-title {
        font-size: 22px;
      }

      .project-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        font-weight: 600;
        border: 1px solid var(--label-border, rgba(255, 255, 255, 0.12));
        background: var(--label-bg, rgba(255, 255, 255, 0.08));
        color: var(--label-color, #fff);
        white-space: nowrap;
        line-height: 1;
      }

      .project-desc {
        font-size: 14px;
        line-height: 1.7;
        color: #d7d7d7;
      }

      .project-code {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 14px;
      }

      .project-code code {
        font-size: 13px;
        color: #9effb1;
        word-break: break-all;
      }

      .project-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: auto;
      }

      .action-btn {
        text-decoration: none;
        color: var(--btn-color, #fff);
        padding: 10px 15px;
        border-radius: 10px;
        font-size: 14px;
        border: 1px solid var(--btn-border, rgba(255, 255, 255, 0.1));
        background: var(--btn-bg, rgba(255, 255, 255, 0.06));
        transition: 0.2s;
        cursor: pointer;
        font-family: inherit;
      }

      .action-btn:hover {
        background: var(--btn-hover-bg, rgba(255, 255, 255, 0.12));
        border-color: var(--btn-hover-border, var(--btn-border, rgba(255, 255, 255, 0.1)));
      }

      .empty-state {
        color: #888;
        padding: 10px 4px 30px;
      }

      footer {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 30px;
        color: #8888885c;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        margin-top: 70px;
      }

      @media (max-width: 800px) {
        header {
          padding: 18px 20px;
          display: grid;
          grid-template-columns: 1fr auto 1fr;
          align-items: center;
        }

        .logo {
          min-width: auto;
        }

        .nav-center {
          position: static;
          transform: none;
          margin: 0 auto;
        }
      }

      @media (max-width: 700px) {
        .projects {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        header {
          grid-template-columns: 1fr;
          gap: 14px;
          text-align: center;
        }

        .nav-center {
          justify-content: center;
        }

        .hero h1 {
          font-size: 34px;
        }

        .project-top {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <div class="grid"></div>

    <header>
      <div class="logo">katerhub development</div>

      <nav class="nav-center">
        <a href="index.html">Home</a>
        <a href="projects.html" class="active">Projects</a>
      </nav>
    </header>

    <section class="hero">
      <h1>Projects</h1>
      <p>Extra projects, loader und links in cleanen Boxen.</p>

      <div class="hero-buttons">
        <a href="https://discord.gg/kSBmA2qKEp" target="_blank" class="discord-btn">
          Join Discord
        </a>

        <a href="https://www.roblox.com/communities/10404102/" target="_blank" class="group-btn">
          Join Roblox Group
        </a>
      </div>
    </section>

    <div class="section-wrap">
      <h2 class="section-title">Scripts</h2>
      <section class="projects" id="scripts-container"></section>

      <h2 class="section-title">Tools</h2>
      <section class="projects" id="tools-container"></section>
    </div>

    <footer>Made with ❤️ by @w2pr</footer>

    <script>
      function createLabel(label, style = {}) {
        if (!label) return "";

        return `
          <span
            class="project-label"
            style="
              --label-bg:${style.bg || "rgba(255,255,255,0.08)"};
              --label-border:${style.border || "rgba(255,255,255,0.12)"};
              --label-color:${style.color || "#fff"};
            "
          >
            ${label}
          </span>
        `;
      }

      function createScriptCard(project, index) {
        const imageHtml = project.image
          ? `<img class="project-image" src="${project.image}" alt="${project.title} preview" />`
          : "";

        return `
          <div class="project-card">
            ${imageHtml}

            <div class="project-content">
              <div class="project-main">
                <div class="project-top">
                  <h2 class="project-title">${project.title}</h2>
                  ${createLabel(project.label, project.labelStyle)}
                </div>

                <p class="project-desc">${project.description || ""}</p>
              </div>

              <div class="project-code">
                <code id="code-${index}">${project.code || ""}</code>
              </div>

              <div class="project-actions">
                <button class="action-btn" onclick="copyCode('code-${index}', this)">Copy</button>
              </div>
            </div>
          </div>
        `;
      }

      function createToolCard(project) {
        const imageHtml = project.image
          ? `<img class="project-image" src="${project.image}" alt="${project.title} preview" />`
          : "";

        const buttonText = project.buttonText || "Visit";
        const buttonLink = project.buttonLink || "#";

        return `
          <div class="project-card">
            ${imageHtml}

            <div class="project-content">
              <div class="project-main">
                <div class="project-top">
                  <h2 class="project-title">${project.title}</h2>
                  ${createLabel(project.label, project.labelStyle)}
                </div>

                <p class="project-desc">${project.description || ""}</p>
              </div>

              <div class="project-actions">
                <a
                  class="action-btn"
                  href="${buttonLink}"
                  target="_blank"
                  style="
                    --btn-bg:${project.buttonStyle?.bg || "rgba(59,130,246,0.16)"};
                    --btn-border:${project.buttonStyle?.border || "rgba(59,130,246,0.35)"};
                    --btn-hover-bg:${project.buttonStyle?.hoverBg || "rgba(59,130,246,0.26)"};
                    --btn-hover-border:${project.buttonStyle?.hoverBorder || "rgba(59,130,246,0.55)"};
                    --btn-color:${project.buttonStyle?.color || "#d7e9ff"};
                  "
                >
                  ${buttonText}
                </a>
              </div>
            </div>
          </div>
        `;
      }

      function renderProjects(data) {
        const scriptsContainer = document.getElementById("scripts-container");
        const toolsContainer = document.getElementById("tools-container");

        const scripts = data.scripts || [];
        const tools = data.tools || [];

        if (scripts.length) {
          scriptsContainer.innerHTML = scripts
            .map((project, index) => createScriptCard(project, index + 1))
            .join("");
        } else {
          scriptsContainer.innerHTML = `<div class="empty-state">No scripts found.</div>`;
        }

        if (tools.length) {
          toolsContainer.innerHTML = tools
            .map((project) => createToolCard(project))
            .join("");
        } else {
          toolsContainer.innerHTML = `<div class="empty-state">No tools found.</div>`;
        }
      }

      async function loadProjects() {
        try {
          const response = await fetch("./files/projects.json");
          if (!response.ok) {
            throw new Error("Could not load projects.json");
          }

          const data = await response.json();
          renderProjects(data);
        } catch (error) {
          document.getElementById("scripts-container").innerHTML =
            `<div class="empty-state">Failed to load projects.</div>`;
          document.getElementById("tools-container").innerHTML =
            `<div class="empty-state">Failed to load projects.</div>`;
          console.error(error);
        }
      }

      function copyCode(id, button) {
        const text = document.getElementById(id).innerText;

        navigator.clipboard.writeText(text).then(() => {
          const oldText = button.innerText;
          button.innerText = "Copied";

          setTimeout(() => {
            button.innerText = oldText;
          }, 1200);
        });
      }

      loadProjects();
    </script>
  </body>
</html>
